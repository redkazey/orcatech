<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orçamento de Serviços - RDTech</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto', sans-serif; background-color: #f0f4f8; }
        .valor-sugerido { display: none; color: #22c55e; font-weight: 500; margin: 4px 0 8px 0; font-size: 0.9em; }
    </style>
</head>
<body class="max-w-2xl mx-auto p-4">
    <h1 class="text-2xl font-bold text-center text-gray-800 mb-6">💻 Orçamento de Serviços de Informática</h1>

    <div class="bg-white rounded-lg shadow p-6 mb-6">
        <h2 class="text-lg font-semibold mb-4 text-gray-700">👤 Dados do Cliente</h2>
        <div class="grid md:grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-600 mb-1">Nome Completo</label>
                <input type="text" id="nomeCliente" class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-600 mb-1">CPF</label>
                <input type="text" id="cpfCliente" class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-600 mb-1">E-mail</label>
                <input type="email" id="emailCliente" class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-600 mb-1">Telefone</label>
                <input type="text" id="telefoneCliente" class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
        </div>

        <!-- ✅ CAMPO DE OBSERVAÇÃO -->
        <div class="mt-4">
            <label class="block text-sm font-medium text-gray-600 mb-1">📝 Observações Gerais</label>
            <textarea id="observacaoGeral" rows="3" class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Informações adicionais, condições, prazos, materiais inclusos..."></textarea>
        </div>
    </div>
