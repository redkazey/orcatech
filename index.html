<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orçamento de Serviços de Informática</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="cabecalho">
            <h1>📋 Orçamento de Serviços de Informática</h1>
            <p>Preencha os dados, adicione serviços e gere seu orçamento em PDF</p>
        </header>

        <section class="card">
            <h2>👤 Dados do Cliente <span class="opcional">(todos opcionais)</span></h2>
            <div class="grid-dados">
                <input type="text" id="nomeCliente" placeholder="Nome completo">
                <input type="text" id="cpfCliente" placeholder="CPF" maxlength="14">
                <input type="email" id="emailCliente" placeholder="E-mail">
                <input type="tel" id="telefoneCliente" placeholder="Telefone (WhatsApp)">
            </div>
        </section>

        <section class="card">
            <h2>🛠️ Serviços Realizados</h2>
            <div id="listaServicos">
                <div class="servico-item">
                    <select class="tipoServico">
                        <option value="">Selecione um serviço</option>
                        <optgroup label="💻 Atendimento Externo (vou até o local)">
                            <option value="Deslocamento até residência/empresa - R$ 60,00">Deslocamento até residência/empresa - R$ 60,00</option>
                            <option value="Atendimento técnico completo no local - R$ 120,00">Atendimento técnico completo no local - R$ 120,00</option>
                            <option value="Instalação e configuração de rede Wi-Fi no local - R$ 180,00">Instalação e configuração de rede Wi-Fi no local - R$ 180,00</option>
                            <option value="Instalação de equipamentos e periféricos no local - R$ 100,00">Instalação de equipamentos e periféricos no local - R$ 100,00</option>
                            <option value="Manutenção de computadores/notebooks no local - R$ 150,00">Manutenção de computadores/notebooks no local - R$ 150,00</option>
                            <option value="Configuração de servidores/roteadores no local - R$ 250,00">Configuração de servidores/roteadores no local - R$ 250,00</option>
                            <option value="Instalação de câmeras e sistema de monitoramento - R$ 220,00">Instalação de câmeras e sistema de monitoramento - R$ 220,00</option>
                            <option value="Instalação e configuração de impressoras na rede - R$ 130,00">Instalação e configuração de impressoras na rede - R$ 130,00</option>
                        </optgroup>
                        <optgroup label="🖥️ Serviços Técnicos">
                            <option value="Formatação e instalação de sistema operacional - R$ 150,00">Formatação e instalação de sistema operacional - R$ 150,00</option>
                            <option value="Instalação de programas e softwares - R$ 80,00">Instalação de programas e softwares - R$ 80,00</option>
                            <option value="Remoção de vírus, malwares e otimização - R$ 100,00">Remoção de vírus, malwares e otimização - R$ 100,00</option>
                            <option value="Troca de peças e componentes - R$ 90,00">Troca de peças e componentes - R$ 90,00</option>
                            <option value="Limpeza interna e manutenção preventiva - R$ 120,00">Limpeza interna e manutenção preventiva - R$ 120,00</option>
                            <option value="Recuperação de dados (HD, SSD, Cartão) - R$ 200,00">Recuperação de dados (HD, SSD, Cartão) - R$ 200,00</option>
                            <option value="Configuração de e-mails, nuvem e backups - R$ 70,00">Configuração de e-mails, nuvem e backups - R$ 70,00</option>
                            <option value="Montagem de computador sob medida - R$ 180,00">Montagem de computador sob medida - R$ 180,00</option>
                            <option value="Consultoria e suporte técnico - R$ 100,00/hora">Consultoria e suporte técnico - R$ 100,00/hora</option>
                            <option value="Configuração de rede cabeada - R$ 160,00">Configuração de rede cabeada - R$ 160,00</option>
                            <option value="Atualização de BIOS e drivers - R$ 80,00">Atualização de BIOS e drivers - R$ 80,00</option>
                        </optgroup>
                        <optgroup label="🔧 Outros">
                            <option value="Outro">Serviço Personalizado (buscar valor justo)</option>
                        </optgroup>
                    </select>
                    <div class="campo-personalizado" style="display: none;">
                        <input type="text" class="descricaoServico" placeholder="Descreva o serviço (ex: Instalação de sistema de alarme)">
                        <button type="button" class="btn-buscar">🔍 Buscar valor justo</button>
                        <span class="valor-sugerido" style="display: none;">Valor médio: R$ <span id="valorSugerido">0,00</span></span>
                        <input type="text" class="valorServico" placeholder="Digite o valor final R$">
                    </div>
                    <button type="button" class="removerServico">×</button>
                </div>
            </div>
            <button type="button" id="adicionarServico" class="btn-adicionar">+ Adicionar Novo Serviço</button>

            <div class="total-box">
                <h3>Valor Total a Pagar: R$ <span id="valorTotal">0,00</span></h3>
            </div>

            <button type="button" id="gerarOrcamento" class="btn-gerar">📄 Gerar Orçamento em PDF</button>
        </section>

        <section class="card historico-section">
            <h2>📚 Histórico de Orçamentos</h2>
            <ul id="listaHistorico"></ul>
            <p id="vazioHistorico" class="vazio">Nenhum orçamento salvo ainda.</p>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
